<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>运行验证</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    iframe {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      border: 0;
      background: white;
    }
    .validation-complete-panel {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 2147483647;
      display: flex;
      align-items: center;
      padding: 10px;
      border: 1px solid rgba(15, 23, 42, 0.16);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 18px 44px rgba(15, 23, 42, 0.18);
      font: 14px/1.4 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #0f172a;
      backdrop-filter: blur(10px);
    }
    button {
      appearance: none;
      border: 0;
      border-radius: 6px;
      background: #166534;
      color: white;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      min-height: 40px;
      padding: 0 16px;
    }
    button:hover { background: #14532d; }
    button:disabled { cursor: default; opacity: 0.72; }
    @media (prefers-color-scheme: dark) {
      .validation-complete-panel {
        border-color: rgba(148, 163, 184, 0.28);
        background: rgba(15, 23, 42, 0.92);
        color: #f8fafc;
      }
    }
  </style>
</head>
<body>
  <iframe src="/" title="生成应用运行验证"></iframe>
  <div class="validation-complete-panel">
    <button type="button" id="complete-validation">验证完成</button>
  </div>
  <script>
    const button = document.getElementById("complete-validation");
    button.addEventListener("click", async () => {
      button.disabled = true;
      button.textContent = "确认中...";
      try {
        const response = await fetch("__APP_BUILDER_MANUAL_COMPLETE_PATH__", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ completedAt: new Date().toISOString() })
        });
        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }
        button.textContent = "已确认";
      } catch (error) {
        button.disabled = false;
        button.textContent = "确认失败，重试";
        console.error("Runtime validation completion failed", error);
      }
    });
  </script>
</body>
</html>
